<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jose & Regina</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<section class="hero">

    <div class="overlay">

        <div class="monograma">
    J | R
</div>

        <p class="subtitulo">NOS CASAMOS</p>

        <h1>JOSE</h1>

        <div class="ampersand">&</div>

        <h1>REGINA</h1>

        <div class="decoracion">
    ───── ♥ ─────
</div>

        <p class="fecha">14 AGOSTO 2026</p>

        <a href="#evento" class="btn">
            VER INVITACIÓN
        </a>

    </div>

</section>

<section class="contador">

    <h2>FALTAN</h2>

    <div id="countdown">

        <div>
            <span id="dias">0</span>
            <small>DÍAS</small>
        </div>

        <div>
            <span id="horas">0</span>
            <small>HORAS</small>
        </div>

        <div>
            <span id="minutos">0</span>
            <small>MINUTOS</small>
        </div>

        <div>
            <span id="segundos">0</span>
            <small>SEGUNDOS</small>
        </div>

    </div>

</section>

<section id="evento" class="evento">

    <h2>DETALLES DEL EVENTO</h2>

    <div class="card">

        <h3>CEREMONIA</h3>

        <p>Basílica Nuestra Señora de Suyapa</p>

        <p>🕔 5:00 PM</p>

    </div>

    <div class="card">

        <h3>RECEPCIÓN</h3>

        <p>Salón Hotel Plaza San Carlos</p>

        <p>🕢 7:30 PM</p>

    </div>

</section>

<section class="confirmacion">

    <h2>CONFIRMA TU ASISTENCIA</h2>

    <button class="btn">
        CONFIRMAR ASISTENCIA
    </button>

</section>

<script src="js/app.js"></script>

</body>
</html>
